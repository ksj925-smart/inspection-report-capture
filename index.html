<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="베어링 촬영"/>
<meta name="theme-color" content="#06070A"/>
<title>제품 360° 자동 촬영 앱</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #06070A;
    font-family: "Pretendard","Pretendard Variable",-apple-system,system-ui,sans-serif;
    color: #fff;
    height: 100%; height: 100dvh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
  }
  #root {
    height: 100%; height: 100dvh;
    display: flex; flex-direction: column;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  ::-webkit-scrollbar { width: 0; height: 0; }
  button { font-family: inherit; }
  button:active { transform: scale(0.97); }
  button { transition: transform 0.1s, background 0.2s, border-color 0.2s, opacity 0.2s; }

  /* 카메라 뷰파인더 */
  #camera-stream {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .camera-overlay {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  /* 안전 영역 대응 */
  .safe-bottom { padding-bottom: max(16px, env(safe-area-inset-bottom)); }
  .safe-top { padding-top: max(16px, env(safe-area-inset-top)); }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <!-- Google 설정 (google-config.js에 Client ID 입력) -->
  <script src="google-config.js"></script>
  <!-- Google Identity Services (OAuth) -->
  <script src="https://accounts.google.com/gsi/client"></script>

  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(<CaptureApp />);

    // PWA 서비스워커 등록
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
